<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f1117" id="meta-theme-color">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ChordBoard">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Chord Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

<!-- ── Top bar ──────────────────────────────────────────────────────────────── -->
<div class="topbar">
  <span class="topbar-title">Chord Board</span>
  <div class="topbar-actions">
    <button id="reset-path" class="icon-btn" title="Reset path">
      <i data-lucide="rotate-ccw"></i>
    </button>
    <button id="theme-toggle" class="icon-btn" title="Toggle theme">
      <i data-lucide="sun" class="icon-sun"></i>
      <i data-lucide="moon" class="icon-moon"></i>
    </button>
    <button id="sound-toggle" class="icon-btn active" title="Sound on/off">
      <i data-lucide="volume-2" class="icon-sound-on"></i>
      <i data-lucide="volume-x" class="icon-sound-off"></i>
    </button>
    <button id="settings-toggle" class="icon-btn" title="Settings" aria-expanded="false">
      <i data-lucide="sliders-horizontal"></i>
    </button>
  </div>
</div>

<!-- ── Key row (always visible) ─────────────────────────────────────────────── -->
<div class="key-row">
  <span class="ctrl-label">Key</span>
  <div class="key-buttons" id="key-buttons"></div>
</div>

<!-- ── Settings drawer ──────────────────────────────────────────────────────── -->
<div class="settings-drawer" id="settings-drawer">
  <div class="settings-inner">
    <div class="ctrl-group">
      <span class="ctrl-label">Instrument</span>
      <div class="pill-group">
        <button class="pill-btn active" data-instrument="piano">Piano</button>
        <button class="pill-btn" data-instrument="guitar">Guitar</button>
        <button class="pill-btn" data-instrument="ukulele">Ukulele</button>
      </div>
    </div>
    <div class="ctrl-group" id="format-group">
      <span class="ctrl-label">Names</span>
      <div class="pill-group">
        <button class="pill-btn active" data-format="english">English</button>
        <button class="pill-btn" data-format="solfege">Solfège</button>
        <button class="pill-btn" data-format="nashville">Nashville</button>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">View</span>
      <div class="pill-group">
        <button class="pill-btn active" data-viewmode="name">Name</button>
        <button class="pill-btn" data-viewmode="diagram">Diagram</button>
      </div>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Structure</span>
      <div id="mood-buttons" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
    </div>
  </div>
</div>

<!-- ── Board ────────────────────────────────────────────────────────────────── -->
<div class="board">

  <div class="row-block row-block-secondary">
    <div class="row-header">
      <span class="row-tag secondary">Secondary Dominants</span>
      <span class="row-hint">V7 — resolves down</span>
      <span class="loop-badge">↓ only</span>
    </div>
    <div class="chord-row" id="row-secondary"></div>
  </div>

  <div class="board-divider" data-label="↓ resolves to main"></div>

  <div class="row-block row-block-main">
    <div class="row-header">
      <span class="row-tag main">Main Chords</span>
      <span class="row-hint">Mix freely</span>
      <span class="loop-badge can-loop">⟳ free</span>
    </div>
    <div class="chord-row" id="row-main"></div>
  </div>

  <div class="board-divider" data-label="↑ return via I, IV or V"></div>

  <div class="row-block row-block-modal">
    <div class="row-header">
      <span class="row-tag modal">Modal Interchange</span>
      <span class="row-hint">Parallel minor — via I, IV, V</span>
      <span class="loop-badge">↕ I/IV/V</span>
    </div>
    <div class="chord-row" id="row-modal"></div>
  </div>

</div>

<!-- ── Progression tray ──────────────────────────────────────────────────────── -->
<div class="prog-tray">
  <div class="prog-tray-header">
    <span class="prog-tray-title">Progression</span>
    <div class="prog-tray-actions">
      <button id="prog-play" class="prog-action-btn" disabled>
        <i data-lucide="play"></i> Play
      </button>
      <button id="prog-undo" class="prog-action-btn">
        <i data-lucide="undo-2"></i> Undo
      </button>
      <button id="prog-clear" class="prog-action-btn prog-clear-btn">
        <i data-lucide="x"></i> Clear
      </button>
    </div>
  </div>
  <div class="prog-steps-wrap">
    <div id="prog-steps"></div>
  </div>
  <div class="prog-export-wrap">
    <span class="prog-export-label">Export:</span>
    <span id="prog-export" class="prog-export-text"></span>
  </div>
</div>

<!-- ── Detail panel ──────────────────────────────────────────────────────────── -->
<div id="detail-panel-overlay">
  <div id="detail-panel">
    <button id="dp-close"><i data-lucide="x"></i></button>
    <div id="dp-chord-name">C</div>
    <div id="dp-chord-meta">I — Major</div>

    <div class="dp-section-label">Piano</div>
    <div id="dp-piano"></div>

    <div class="dp-section-label" id="dp-fret-label" style="display:none">Guitar</div>
    <div id="dp-fret-wrap" style="display:none"></div>

    <button class="dp-play-btn" id="dp-play">
      <i data-lucide="play"></i> Play chord
    </button>

    <div class="dp-section-label">Intervals</div>
    <div class="pills" id="dp-intervals"></div>

    <div class="dp-section-label">Notes</div>
    <div class="pills" id="dp-notes"></div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
